<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>領藥號控制台 - 連動版</title>
  <!-- 替換為 MQTT 同步套件 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.5/mqtt.min.js"></script>
  <style>
    body { background: #333; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .status { font-size: 24px; margin-bottom: 10px; color: #DCEDC8; }
    .current-num { font-size: 100px; font-weight: bold; margin-bottom: 40px; color: #FFFFFF; }
    .btn-group { display: flex; gap: 20px; width: 90%; max-width: 500px; }
    button { flex: 1; padding: 40px; font-size: 40px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
    button:active { opacity: 0.7; }
    .minus { background: #ff5252; color: white; }
    .plus { background: #00c853; color: white; }
    .reset { background: #777; color: white; margin-top: 50px; width: 40%; font-size: 18px; padding: 10px; border-radius: 10px; }
    #conn-status { margin-top: 20px; font-size: 14px; color: #aaa; }
  </style>
</head>
<body>
  <div class="status">同步中號碼</div>
  <div class="current-num" id="value">0</div>
  
  <div class="btn-group">
    <button class="minus" onclick="change(-1)">- 1</button>
    <button class="plus" onclick="change(1)">+ 1</button>
  </div>

  <button class="reset" onclick="resetNumber()">歸零重置</button>
  
  <div id="conn-status">連線中...</div>

  <script>
    const valueDisplay = document.getElementById("value");
    const statusEl = document.getElementById("conn-status");
    let currentNumber = parseInt(localStorage.getItem('happyZebraBasicNumber')) || 0;
    
    // 初始化畫面
    valueDisplay.innerText = currentNumber;

    // ================= MQTT 連線設定 =================
    const topic = "happy-zebra-queue-sync-alan001006003"; // 必須與大螢幕一致
    const clientId = 'admin_' + Math.random().toString(16).substr(2, 8);

    const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt', {
        clientId: clientId,
        clean: true,
        connectTimeout: 5000,
        reconnectPeriod: 3000,
    });

    client.on('connect', () => {
        statusEl.innerText = "● 已連線至大螢幕";
        statusEl.style.color = "#00c853";
        client.subscribe(topic);
        
        // 連線成功時，把目前號碼推播給剛開啟的大螢幕
        client.publish(topic, JSON.stringify({ sender: clientId, number: currentNumber }), { retain: true });
    });

    client.on('reconnect', () => {
        statusEl.innerText = "重新連線中...";
        statusEl.style.color = "#ff5252";
    });

    // 接收其他控制台的更新 (防多台手機操作衝突)
    client.on('message', (t, message) => {
        if (t === topic) {
            try {
                const data = JSON.parse(message.toString());
                if (data.sender !== clientId) {
                    currentNumber = data.number;
                    valueDisplay.innerText = currentNumber;
                    localStorage.setItem('happyZebraBasicNumber', currentNumber);
                }
            } catch(e) {}
        }
    });

    // 修改數值（同步更新到大螢幕）
    window.change = function(delta) {
        currentNumber = Math.max(0, currentNumber + delta);
        valueDisplay.innerText = currentNumber;
        localStorage.setItem('happyZebraBasicNumber', currentNumber);
        
        if(client && client.connected) {
            client.publish(topic, JSON.stringify({ sender: clientId, number: currentNumber }), { retain: true });
        }
    }

    // 重置數值
    window.resetNumber = function() {
        if(confirm("確定要將領藥號歸零嗎？")) {
            currentNumber = 0;
            valueDisplay.innerText = currentNumber;
            localStorage.setItem('happyZebraBasicNumber', currentNumber);
            
            if(client && client.connected) {
                client.publish(topic, JSON.stringify({ sender: clientId, number: currentNumber }), { retain: true });
            }
        }
    }
  </script>
</body>
</html>
