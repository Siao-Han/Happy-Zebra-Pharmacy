<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>領藥號控制台 - 連動版</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    body { background: #333; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .status { font-size: 24px; margin-bottom: 10px; color: #DCEDC8; }
    .current-num { font-size: 100px; font-weight: bold; margin-bottom: 40px; color: #FFFFFF; }
    .btn-group { display: flex; gap: 20px; width: 90%; max-width: 500px; }
    button { flex: 1; padding: 40px; font-size: 40px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
    button:active { opacity: 0.7; }
    .minus { background: #ff5252; color: white; }
    .plus { background: #00c853; color: white; }
    .reset { background: #777; color: white; margin-top: 50px; width: 40%; font-size: 18px; padding: 10px; border-radius: 10px; }
  </style>
</head>
<body>
  <div class="status">同步中號碼</div>
  <div class="current-num" id="value">--</div>
  
  <div class="btn-group">
    <button class="minus" onclick="change(-1)">- 1</button>
    <button class="plus" onclick="change(1)">+ 1</button>
  </div>

  <button class="reset" onclick="reset()">歸零重置</button>

  <script>
    // 這裡的 Config 必須與大螢幕網頁完全一致才能連動
    const firebaseConfig = {
      apiKey: "AIzaSyDWkmKm3TWaHXQ2CPkSJ0MBdsORiECSZ94",
      authDomain: "siao-b8cf2.firebaseapp.com",
      databaseURL: "https://siao-b8cf2-default-rtdb.firebaseio.com",
      projectId: "siao-b8cf2",
      storageBucket: "siao-b8cf2.firebasestorage.app",
      messagingSenderId: "51378819186",
      appId: "1:51378819186:web:35bc056d5b4c17cc12f2eb"
    };

    firebase.initializeApp(firebaseConfig);
    
    // 指向與大螢幕相同的資料庫路徑
    const db = firebase.database().ref("counter/value");

    // 監聽數值，確保控制台看到的數字跟大螢幕一模一樣
    db.on("value", (snapshot) => {
      document.getElementById("value").innerText = snapshot.val() ?? 0;
    });

    // 修改數值（同步更新到 Firebase）
    function change(delta) {
      db.transaction((curr) => {
        return (curr || 0) + delta;
      });
    }

    // 重置數值
    function reset() {
      if(confirm("確定要將領藥號歸零嗎？")) {
        db.set(0);
      }
    }
  </script>
</body>
</html>
